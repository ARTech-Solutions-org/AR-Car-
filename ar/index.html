<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile — AR Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="/config.js"></script>
  <style>
    :root { --mg-red: #da291c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Outfit', sans-serif; overflow: hidden; color: #fff; touch-action: none; }

    #safari-bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; display: none;
    }
    #ar-container {
      position: fixed; inset: 0; z-index: 1; display: none;
    }

    /* ── Start screen ── */
    #sov {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0a0a0f 0%, #12121a 60%, #1a0505 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.4s;
    }
    #sov.off { opacity: 0; pointer-events: none; }
    #sov img { width: 80px; filter: brightness(0) invert(1); margin-bottom: 8px; }
    #sov .sv-t { font-size: 2.4rem; font-weight: 700; letter-spacing: 0.04em; }
    #sov .sv-t em { color: var(--mg-red); font-style: normal; }
    #sov .sv-s { font-size: 0.9rem; color: rgba(255,255,255,0.5); text-align: center; max-width: 260px; line-height: 1.5; }
    #startBtn {
      margin-top: 24px;
      background: var(--mg-red); color: #fff;
      border: none; border-radius: 50px;
      padding: 16px 48px; font-size: 1rem; font-weight: 700;
      font-family: 'Outfit', sans-serif; cursor: pointer;
      letter-spacing: 0.08em;
      box-shadow: 0 8px 32px rgba(218,41,28,0.4);
      transition: transform 0.15s;
    }
    #startBtn:active { transform: scale(0.96); }

    #top-logo {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      width: 52px; z-index: 50;
      filter: brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      opacity: 0; transition: opacity 0.5s; display: none;
    }
    #top-logo.visible { opacity: 1; }

    #tap-prompt {
      position: fixed; bottom: 110px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; padding: 12px 28px;
      font-size: 0.9rem; font-weight: 600;
      z-index: 50; opacity: 0; transition: opacity 0.4s;
      display: none; white-space: nowrap;
    }
    #tap-prompt.visible { opacity: 1; }

    /* ── Hint bar after placement ── */
    #hint-bar {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: none; gap: 18px; z-index: 50;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px; padding: 10px 24px;
      font-size: 0.75rem; color: rgba(255,255,255,0.7);
      letter-spacing: 0.03em; white-space: nowrap;
    }
    #hint-bar.visible { display: flex; }
    #hint-bar span { display: flex; align-items: center; gap: 5px; }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 10px 22px; border-radius: 50px;
      font-size: 0.85rem; z-index: 200;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; max-width: 88vw; text-align: center;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <video id="safari-bg" autoplay playsinline muted></video>
  <div id="ar-container"></div>

  <div id="sov">
    <img src="/shared/mg-logo.svg" alt="Mobile"/>
    <div class="sv-t">Mobile <em>AR</em></div>
    <div class="sv-s">Point camera at a flat surface<br>then tap to place the phone</div>
    <button id="startBtn">Open Camera</button>
  </div>

  <img src="/shared/mg-logo.svg" id="top-logo" alt="Mobile"/>
  <div id="tap-prompt">👆 Tap to place the phone</div>

  <div id="hint-bar">
    <span>📱 Tap a 3D App Button on screen to open</span>
    <span>↔ Drag to rotate</span>
    <span>🤏 Pinch to resize</span>
  </div>

  <div id="toast"></div>

  <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';

    // ── DOM ───────────────────────────────────────────────────────────────────
    const sov      = document.getElementById('sov');
    const startBtn = document.getElementById('startBtn');
    const container= document.getElementById('ar-container');
    const safariBg = document.getElementById('safari-bg');
    const tapPrompt= document.getElementById('tap-prompt');
    const topLogo  = document.getElementById('top-logo');
    const hintBar  = document.getElementById('hint-bar');
    const toast    = document.getElementById('toast');

    // ── App Details Specs Database ────────────────────────────────────────────
    const APP_SPECS_DB = {
      DISPLAY: {
        category: 'DISPLAY TECHNOLOGY',
        name: '6.7" Super Retina OLED',
        tileClass: 'blue',
        icon: '📱',
        specs: [
          { label: 'Screen Tech', val: 'LTPO 4.0 Super Retina AMOLED' },
          { label: 'Resolution', val: '3200 x 1440 QHD+ (526 ppi)' },
          { label: 'Refresh Rate', val: '1Hz – 120Hz Dynamic Adaptive' },
          { label: 'Brightness', val: '3000 nits Outdoor Vision' },
          { label: 'Protection', val: 'Armor Crystal Shield' }
        ]
      },
      CHIPSET: {
        category: 'PROCESSOR POWER',
        name: '3nm Bionic Neural Engine',
        tileClass: 'purple',
        icon: '⚡',
        specs: [
          { label: 'Architecture', val: '3nm Ultra-Efficiency Process' },
          { label: 'CPU Cores', val: '8-Core (2 Ultra + 6 Efficiency)' },
          { label: 'GPU Engine', val: '12-Core Hardware Ray-Tracing' },
          { label: 'AI NPU Engine', val: '32-Core Neural Processing' },
          { label: 'Cooling System', val: 'Dual Vapor Chamber Liquid' }
        ]
      },
      CAMERA: {
        category: 'PRO CAMERA SYSTEM',
        name: '200 MP Quad Ultra-Sensing',
        tileClass: 'red',
        icon: '📸',
        specs: [
          { label: 'Main Lens', val: '200 MP Ultra-Sensing OIS' },
          { label: 'Telephoto Lens', val: '50 MP 10x Periscope (100x Zoom)' },
          { label: 'Ultra-Wide Lens', val: '48 MP 123° FOV Macro System' },
          { label: 'Video Capture', val: '8K HDR Cinema Video @ 60 FPS' },
          { label: 'AI Night Mode', val: 'Real-Time Night Vision AI' }
        ]
      },
      BATTERY: {
        category: 'POWER & CHARGING',
        name: '5000 mAh High-Density',
        tileClass: 'green',
        icon: '🔋',
        specs: [
          { label: 'Cell Capacity', val: '5000 mAh Dual-Cell Density' },
          { label: 'Wired Fast Charge', val: '100W (0 to 100% in 18 mins)' },
          { label: 'Wireless Charge', val: '50W Qi2 Magnetic Fast Charge' },
          { label: 'Power Share', val: '15W Reverse Wireless Share' },
          { label: 'Health AI', val: 'Smart Battery Lifespan Guard' }
        ]
      },
      NETWORK: {
        category: 'CONNECTIVITY',
        name: 'Ultra 5G & Wi-Fi 7',
        tileClass: 'cyan',
        icon: '📶',
        specs: [
          { label: '5G Modem', val: 'Dual 5G SA/NSA Multi-Gigabit' },
          { label: 'Wi-Fi Speed', val: 'Wi-Fi 7 (802.11be) 6GHz Band' },
          { label: 'Bluetooth', val: 'Bluetooth 5.4 Low Latency' },
          { label: 'Satellite Link', val: 'Emergency 2-Way Satellite SOS' },
          { label: 'NFC Payments', val: '360° Multi-Angle Tap & Pay' }
        ]
      },
      MEMORY: {
        category: 'STORAGE & SPEED',
        name: '512 GB UFS 4.0 Storage',
        tileClass: 'gold',
        icon: '💾',
        specs: [
          { label: 'Internal Storage', val: '512 GB UFS 4.0 High-Speed' },
          { label: 'System RAM', val: '16 GB LPDDR5X Ultra Memory' },
          { label: 'Read Speed', val: 'Up to 4,200 MB/s Sequential' },
          { label: 'Write Speed', val: 'Up to 2,800 MB/s Sequential' },
          { label: 'Cloud Sync', val: 'Auto-Sync Instant Cloud' }
        ]
      }
    };

    // ── Three.js setup ────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    scene.add(camera);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(4, 10, 6);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-4, 2, -4);
    scene.add(fill);

    const clock = new THREE.Clock();
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Reticle ───────────────────────────────────────────────────────────────
    function buildReticle() {
      const g = new THREE.Group();
      const outerGeo = new THREE.RingGeometry(0.20, 0.24, 48);
      outerGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      g.add(new THREE.Mesh(outerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.9, transparent: true, side: THREE.DoubleSide })));
      const dotGeo = new THREE.CircleGeometry(0.04, 32);
      dotGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      g.add(new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color: 0xda291c, opacity: 0.9, transparent: true })));
      g.matrixAutoUpdate = false;
      g.visible = false;
      scene.add(g);
      return g;
    }
    const reticle = buildReticle();

    // ── State Machine ─────────────────────────────────────────────────────────
    let carRoot   = null;
    let screenMeshRef = null;
    let screenW   = 0.1;
    let screenH   = 0.2;
    let placed    = false;
    let carScale  = 1.0;
    let currentScale = 1.0;
    let carYaw    = 0;

    let currentScreenState = 'HOMEPAGE'; // 'HOMEPAGE' | 'APP_VIEW'
    let activeAppKey = null;

    let bgScreenMesh = null;
    let app3DButtonMeshes = []; // Array of discrete 3D App Button Meshes
    let home3DButtonMesh = null; // Discrete 3D Home Button Mesh

    // ── Texture Generator Helpers for 3D Mesh Buttons ─────────────────────────
    function create3DTileTexture(app) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 200;
      const ctx = canvas.getContext('2d');

      // Card Background
      ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
      ctx.beginPath(); ctx.roundRect(8, 8, 240, 184, 28); ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.lineWidth = 2.5; ctx.stroke();

      // Icon Squircle
      const bgColors = {
        blue: ['#007aff', '#00c6ff'],
        purple: ['#af52de', '#7928ca'],
        red: ['#ff3b30', '#ff9500'],
        green: ['#34c759', '#30d158'],
        cyan: ['#5ac8fa', '#007aff'],
        gold: ['#ffcc00', '#ff9500']
      };
      const colors = bgColors[app.tileClass] || ['#007aff', '#00c6ff'];
      const grad = ctx.createLinearGradient(24, 24, 84, 84);
      grad.addColorStop(0, colors[0]);
      grad.addColorStop(1, colors[1]);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(24, 24, 60, 60, 16); ctx.fill();

      // Icon Emoji
      ctx.font = '32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(app.icon, 54, 66);

      // Title & Specs
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
      ctx.font = '600 15px Outfit, sans-serif';
      ctx.fillText(app.title, 24, 112);

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px Outfit, sans-serif';
      ctx.fillText(app.val, 24, 142);

      ctx.fillStyle = '#00f0ff';
      ctx.font = '600 15px Outfit, sans-serif';
      ctx.fillText(app.detail, 24, 168);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function create3DHomeButtonTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 440;
      canvas.height = 90;
      const ctx = canvas.getContext('2d');

      // Home Button Card
      ctx.fillStyle = 'rgba(0, 240, 255, 0.28)';
      ctx.beginPath(); ctx.roundRect(8, 8, 424, 74, 37); ctx.fill();
      ctx.strokeStyle = '#00f0ff';
      ctx.lineWidth = 3; ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px Outfit, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🏠 RETURN TO HOME', 220, 54);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createOLEDWallpaperTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, 512, 1024);
      grad.addColorStop(0, '#0c0e17');
      grad.addColorStop(0.5, '#121626');
      grad.addColorStop(1, '#080910');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 512, 1024);

      // Glowing Ambient Mesh Orbs
      ctx.fillStyle = 'rgba(0, 122, 255, 0.18)';
      ctx.beginPath(); ctx.arc(120, 180, 180, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(175, 82, 222, 0.18)';
      ctx.beginPath(); ctx.arc(400, 750, 220, 0, Math.PI * 2); ctx.fill();

      // Top Status Bar
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px Outfit, sans-serif';
      ctx.textAlign = 'left'; ctx.fillText('09:41', 32, 45);
      ctx.textAlign = 'right'; ctx.fillText('5G  100%', 480, 45);

      // Header Card
      ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.beginPath(); ctx.roundRect(32, 70, 448, 80, 20); ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
      ctx.lineWidth = 1.5; ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 26px Outfit, sans-serif';
      ctx.textAlign = 'left'; ctx.fillText('FLAGSHIP PHONE', 56, 110);
      ctx.fillStyle = '#00f0ff';
      ctx.font = '600 16px Outfit, sans-serif'; ctx.fillText('⚡ 5G ULTRA POWERED', 56, 134);

      // Bottom App Dock
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.beginPath(); ctx.roundRect(32, 860, 448, 90, 32); ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.stroke();

      const dockIcons = ['📞', '💬', '🌐', '⚙️'];
      dockIcons.forEach((ic, i) => {
        ctx.font = '36px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(ic, 80 + i * 110, 918);
      });

      // Bottom Home Indicator Bar
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.roundRect(186, 986, 140, 6, 3); ctx.fill();

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function createScreenAppViewTexture(appKey) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      const data = APP_SPECS_DB[appKey];
      if (!data) return null;

      // OLED Wallpaper
      const grad = ctx.createLinearGradient(0, 0, 512, 1024);
      grad.addColorStop(0, '#0c0e17');
      grad.addColorStop(0.5, '#121626');
      grad.addColorStop(1, '#080910');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 512, 1024);

      // Status Bar
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px Outfit, sans-serif';
      ctx.textAlign = 'left'; ctx.fillText('09:41', 32, 45);
      ctx.textAlign = 'right'; ctx.fillText('5G  100%', 480, 45);

      // App Hero Card
      ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.beginPath(); ctx.roundRect(32, 134, 448, 110, 24); ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
      ctx.lineWidth = 1.5; ctx.stroke();

      const bgColors = {
        blue: ['#007aff', '#00c6ff'], purple: ['#af52de', '#7928ca'],
        red: ['#ff3b30', '#ff9500'], green: ['#34c759', '#30d158'],
        cyan: ['#5ac8fa', '#007aff'], gold: ['#ffcc00', '#ff9500']
      };
      const colors = bgColors[data.tileClass] || ['#007aff', '#00c6ff'];
      const tileGrad = ctx.createLinearGradient(52, 156, 116, 220);
      tileGrad.addColorStop(0, colors[0]);
      tileGrad.addColorStop(1, colors[1]);
      ctx.fillStyle = tileGrad;
      ctx.beginPath(); ctx.roundRect(52, 156, 64, 64, 18); ctx.fill();

      ctx.font = '32px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(data.icon, 84, 200);

      ctx.textAlign = 'left';
      ctx.fillStyle = '#00f0ff'; ctx.font = '700 13px Outfit, sans-serif'; ctx.fillText(data.category, 134, 179);
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 22px Outfit, sans-serif'; ctx.fillText(data.name, 134, 208);

      // Specs List
      const startY = 258;
      const rowH = 118;
      data.specs.forEach((s, idx) => {
        const y = startY + idx * rowH;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
        ctx.beginPath(); ctx.roundRect(32, y, 448, 102, 20); ctx.fill();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)'; ctx.lineWidth = 1; ctx.stroke();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.55)'; ctx.font = '600 14px Outfit, sans-serif'; ctx.fillText(s.label, 54, y + 38);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 21px Outfit, sans-serif'; ctx.fillText(s.val, 54, y + 74);
      });

      // Bottom Indicator
      ctx.fillStyle = '#00f0ff';
      ctx.beginPath(); ctx.roundRect(186, 986, 140, 6, 3); ctx.fill();

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ── Build Discrete 3D Interactive Mesh Buttons ──────────────────────────
    function build3DButtons(screenMesh) {
      const appDefs = [
        { key: 'DISPLAY', col: -1, row:  1, icon: '📱', tileClass: 'blue', title: 'DISPLAY', val: '6.7" OLED', detail: '120Hz LTPO' },
        { key: 'CHIPSET', col:  1, row:  1, icon: '⚡', tileClass: 'purple', title: 'CHIPSET', val: '3nm Bionic', detail: 'Octa-Core' },
        { key: 'CAMERA',  col: -1, row:  0, icon: '📸', tileClass: 'red', title: 'CAMERA', val: '200 MP', detail: '8K HDR Video' },
        { key: 'BATTERY', col:  1, row:  0, icon: '🔋', tileClass: 'green', title: 'BATTERY', val: '5000 mAh', detail: '100W Fast' },
        { key: 'NETWORK', col: -1, row: -1, icon: '📶', tileClass: 'cyan', title: 'NETWORK', val: 'Ultra 5G', detail: 'Wi-Fi 7' },
        { key: 'MEMORY',  col:  1, row: -1, icon: '💾', tileClass: 'gold', title: 'MEMORY', val: '512 GB', detail: '16GB RAM' },
      ];

      const btnGeo = new THREE.PlaneGeometry(screenW * 0.44, screenH * 0.22);
      app3DButtonMeshes = [];

      appDefs.forEach(def => {
        const tex = create3DTileTexture(def);
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          side: THREE.DoubleSide,
          transparent: true
        });
        const mesh = new THREE.Mesh(btnGeo, mat);

        const localX = def.col * screenW * 0.23;
        const localY = def.row * screenH * 0.20;
        const localZ = 0.003; // Slightly in front of screen background

        mesh.position.set(localX, localY, localZ);
        mesh.userData = { appKey: def.key, baseZ: localZ };

        screenMesh.add(mesh);
        app3DButtonMeshes.push(mesh);
      });

      // ── Create 3D Home Button Mesh ──
      const homeGeo = new THREE.PlaneGeometry(screenW * 0.85, screenH * 0.12);
      const homeTex = create3DHomeButtonTexture();
      const homeMat = new THREE.MeshBasicMaterial({
        map: homeTex,
        side: THREE.DoubleSide,
        transparent: true
      });

      home3DButtonMesh = new THREE.Mesh(homeGeo, homeMat);
      home3DButtonMesh.position.set(0, screenH * 0.38, 0.005);
      home3DButtonMesh.visible = false; // Hidden on homepage
      screenMesh.add(home3DButtonMesh);
    }

    // ── Switch Screen Views ──
    function openAppView(appKey) {
      currentScreenState = 'APP_VIEW';
      activeAppKey = appKey;

      // Hide 6 App 3D Buttons, Show Home 3D Button
      app3DButtonMeshes.forEach(m => m.visible = false);
      if (home3DButtonMesh) home3DButtonMesh.visible = true;

      // Change Screen Background to App Specs View
      const specTex = createScreenAppViewTexture(appKey);
      if (specTex && bgScreenMesh) {
        bgScreenMesh.material.map = specTex;
        bgScreenMesh.material.needsUpdate = true;
      }
    }

    function openHomepage() {
      currentScreenState = 'HOMEPAGE';
      activeAppKey = null;

      // Show 6 App 3D Buttons, Hide Home 3D Button
      app3DButtonMeshes.forEach(m => m.visible = true);
      if (home3DButtonMesh) home3DButtonMesh.visible = false;

      // Restore OLED Wallpaper Background
      const homeTex = createOLEDWallpaperTexture();
      if (homeTex && bgScreenMesh) {
        bgScreenMesh.material.map = homeTex;
        bgScreenMesh.material.needsUpdate = true;
      }
    }

    // Tactile 3D Physical Button Press Animation
    function animateButtonPress(mesh, callback) {
      const baseZ = mesh.userData.baseZ || mesh.position.z;
      const targetZ = baseZ - 0.004;

      // Depress inward
      let start = performance.now();
      function step1(now) {
        const t = Math.min((now - start) / 100, 1);
        mesh.position.z = THREE.MathUtils.lerp(baseZ, targetZ, t);
        if (t < 1) {
          requestAnimationFrame(step1);
        } else {
          // Spring back up
          let start2 = performance.now();
          function step2(now2) {
            const t2 = Math.min((now2 - start2) / 120, 1);
            mesh.position.z = THREE.MathUtils.lerp(targetZ, baseZ, t2);
            if (t2 < 1) requestAnimationFrame(step2);
            else if (callback) callback();
          }
          requestAnimationFrame(step2);
        }
      }
      requestAnimationFrame(step1);
    }

    // ── Direct 3D Mesh Button Raycasting ──
    const raycaster = new THREE.Raycaster();
    const pointer   = new THREE.Vector2();

    function checkScreenClick(clientX, clientY) {
      if (!placed || !screenMeshRef) return;

      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      if (currentScreenState === 'HOMEPAGE') {
        // Raycast directly against the Array of 6 3D App Button Meshes!
        const intersects = raycaster.intersectObjects(app3DButtonMeshes, true);
        if (intersects.length > 0) {
          const hitMesh = intersects[0].object;
          const appKey = hitMesh.userData?.appKey;
          if (appKey) {
            animateButtonPress(hitMesh, () => openAppView(appKey));
          }
        }
      } else if (currentScreenState === 'APP_VIEW') {
        // Raycast directly against the 3D Home Button Mesh!
        if (home3DButtonMesh) {
          const intersects = raycaster.intersectObject(home3DButtonMesh, true);
          if (intersects.length > 0) {
            animateButtonPress(home3DButtonMesh, () => openHomepage());
          }
        }
      }
    }

    // ── Load model ───────────────────────────────────────────────────────────
    const loader = new GLTFLoader();
    const draco  = new DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    loader.setDRACOLoader(draco);

    const modelPath = (typeof CONFIG !== 'undefined' && CONFIG.MODEL_PATH) ? CONFIG.MODEL_PATH : '/mg7.glb';
    loader.load(modelPath, (gltf) => {
      carRoot = gltf.scene;
      const box = new THREE.Box3().setFromObject(carRoot);
      const sz  = new THREE.Vector3();
      const ctr = new THREE.Vector3();
      box.getSize(sz);
      box.getCenter(ctr);

      // Fit to smartphone scale (1.0m max dimension)
      carScale = 1.0 / Math.max(sz.x, sz.y, sz.z);
      currentScale = carScale;

      // ── Auto-Detect Smartphone 3D Axis Orientation ──
      const dimensions = [
        { axis: 'x', size: sz.x },
        { axis: 'y', size: sz.y },
        { axis: 'z', size: sz.z }
      ].sort((a, b) => a.size - b.size);

      const depthDim  = dimensions[0]; // Smallest = Thickness
      const widthDim  = dimensions[1]; // Middle   = Screen Width
      const heightDim = dimensions[2]; // Largest  = Screen Height

      screenW = widthDim.size * 0.92;
      screenH = heightDim.size * 0.92;

      // Create OLED Background Screen Mesh
      const bgTex = createOLEDWallpaperTexture();
      const bgMat = new THREE.MeshBasicMaterial({ map: bgTex, side: THREE.DoubleSide, transparent: true });
      const bgGeo = new THREE.PlaneGeometry(screenW, screenH);
      bgScreenMesh = new THREE.Mesh(bgGeo, bgMat);

      // Align flush against front display face of 3D phone model
      if (depthDim.axis === 'z') {
        bgScreenMesh.position.set(ctr.x, ctr.y, ctr.z + depthDim.size * 0.51);
      } else if (depthDim.axis === 'y') {
        bgScreenMesh.rotation.x = -Math.PI / 2;
        bgScreenMesh.position.set(ctr.x, ctr.y + depthDim.size * 0.51, ctr.z);
      } else if (depthDim.axis === 'x') {
        bgScreenMesh.rotation.y = Math.PI / 2;
        bgScreenMesh.position.set(ctr.x + depthDim.size * 0.51, ctr.y, ctr.z);
      }

      carRoot.add(bgScreenMesh);
      screenMeshRef = bgScreenMesh;

      // Build 6 Discrete 3D Interactive Mesh Buttons & 1 3D Home Button Mesh
      build3DButtons(bgScreenMesh);

      carRoot.visible = false;
      scene.add(carRoot);
    }, undefined, (e) => showToast('Load error: ' + e.message));

    // ── Touch / Pointer & Drag State ──────────────────────────────────────────
    let dragActive       = false;
    let lastDragX        = 0;
    let pinchActive      = false;
    let lastPinchDist    = 0;
    let lastPinchScale   = 1.0;

    let touchStartX      = 0;
    let touchStartY      = 0;

    function getPinchDist(e) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function enableGestures() {
      document.addEventListener('touchstart', onTStart, { passive: true });
      document.addEventListener('touchmove',  onTMove,  { passive: true });
      document.addEventListener('touchend',   onTEnd,   { passive: true });
      document.addEventListener('click',      onMouseClick);
    }

    function onTStart(e) {
      if (!placed || !carRoot) return;
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        lastDragX   = touchStartX;
        dragActive  = false;
      } else if (e.touches.length === 2) {
        dragActive    = false;
        pinchActive   = true;
        lastPinchDist  = getPinchDist(e);
        lastPinchScale = currentScale;
      }
    }

    function onTMove(e) {
      if (!placed || !carRoot) return;
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastDragX;
        const totalDist = Math.hypot(e.touches[0].clientX - touchStartX, e.touches[0].clientY - touchStartY);

        if (totalDist > 8) {
          dragActive = true;
          lastDragX = e.touches[0].clientX;
          carYaw += dx * 0.008;
          carRoot.rotation.y = carYaw;
        }
      } else if (pinchActive && e.touches.length === 2) {
        const dist   = getPinchDist(e);
        const factor = dist / lastPinchDist;
        const newScale = Math.max(carScale * 0.3, Math.min(carScale * 4.0, lastPinchScale * factor));
        currentScale = newScale;
        carRoot.scale.setScalar(currentScale);
      }
    }

    function onTEnd(e) {
      if (e.changedTouches && e.changedTouches.length === 1) {
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const totalDist = Math.hypot(endX - touchStartX, endY - touchStartY);

        if (totalDist <= 8) {
          checkScreenClick(endX, endY);
        }
      }
      if (e.touches.length === 0) {
        pinchActive = false;
        dragActive  = false;
      } else if (e.touches.length === 1) {
        pinchActive = false;
        lastPinchDist = 0;
      }
    }

    function onMouseClick(e) {
      if (e.target.closest('#sov') || e.target.closest('#startBtn')) return;
      checkScreenClick(e.clientX, e.clientY);
    }

    // ── Common placement helper ───────────────────────────────────────────────
    function placeCar(worldPos) {
      if (!carRoot) { showToast('Model still loading…'); return; }
      placed = true;
      reticle.visible = false;
      hideTapPrompt();

      carRoot.position.copy(worldPos);
      carRoot.scale.setScalar(0);
      carRoot.visible = true;
      carRoot.rotation.y = carYaw;

      // Face camera on the Y axis
      const cp = new THREE.Vector3();
      camera.getWorldPosition(cp);
      cp.y = carRoot.position.y;
      carRoot.lookAt(cp);
      carYaw = carRoot.rotation.y;

      // Scale-up pop
      animateScale(carRoot, currentScale, 550);

      setTimeout(() => {
        hintBar.classList.add('visible');
        enableGestures();
      }, 620);
    }

    // ── Start button ──────────────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const hasWebXR = navigator.xr && await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
      if (hasWebXR)      startWebXR();
      else if (isIOS)    startSafariAR();
      else               showToast('AR requires Chrome on Android or Safari on iOS 16+');
    });

    // ─────────────────────────────────────────────────────────────────────────
    // PATH A — WebXR / Android Chrome
    // ─────────────────────────────────────────────────────────────────────────
    let hitTestSrc = null, hitTestReq = false;

    async function startWebXR() {
      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body },
        });
        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);
        session.addEventListener('end', () => {
          placed = false; hitTestSrc = null; hitTestReq = false;
          hintBar.classList.remove('visible');
        });
        sov.classList.add('off');
        container.style.display = 'block';
        showTapPrompt(); showLogo();

        session.addEventListener('select', (e) => {
          if (!placed && reticle.visible) {
            const pos = new THREE.Vector3();
            reticle.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
            placeCar(pos);
          } else if (placed && screenMeshRef) {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            if (currentScreenState === 'HOMEPAGE') {
              const intersects = raycaster.intersectObjects(app3DButtonMeshes, true);
              if (intersects.length > 0 && intersects[0].object.userData?.appKey) {
                openAppView(intersects[0].object.userData.appKey);
              }
            } else if (currentScreenState === 'APP_VIEW' && home3DButtonMesh) {
              const intersects = raycaster.intersectObject(home3DButtonMesh, true);
              if (intersects.length > 0) {
                openHomepage();
              }
            }
          }
        });

        renderer.setAnimationLoop((time, frame) => {
          clock.getDelta();
          if (frame) {
            const ref = renderer.xr.getReferenceSpace();
            const ses = renderer.xr.getSession();
            if (!hitTestReq) {
              ses.requestReferenceSpace('viewer').then(vs =>
                ses.requestHitTestSource({ space: vs }).then(s => { hitTestSrc = s; })
              );
              hitTestReq = true;
            }
            if (hitTestSrc && !placed) {
              const results = frame.getHitTestResults(hitTestSrc);
              if (results.length > 0) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(ref).transform.matrix);
                reticle.matrixWorldNeedsUpdate = true;
                const p = 1 + 0.1 * Math.sin(time * 0.005);
                reticle.children.forEach(c => c.scale.setScalar(p));
              } else { reticle.visible = false; }
            }
          }
          renderer.render(scene, camera);
        });

      } catch (err) {
        showToast('AR start failed: ' + err.message);
        console.error(err);
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // PATH B — iOS Safari (camera BG + DeviceOrientation)
    // ─────────────────────────────────────────────────────────────────────────
    async function startSafariAR() {
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
      }
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width:{ideal:1920}, height:{ideal:1080} }, audio: false
        });
      } catch(err) {
        showToast('Camera denied. Enable in Settings → Safari → Camera.'); return;
      }
      safariBg.srcObject = stream;
      safariBg.style.display = 'block';
      await safariBg.play().catch(() => {});

      container.style.display = 'block';
      sov.classList.add('off');
      camera.position.set(0, 1.6, 0);
      camera.rotation.order = 'YXZ';
      reticle.matrixAutoUpdate = true;

      // DeviceOrientation → camera
      const _eu = new THREE.Euler(0,0,0,'YXZ');
      const _q1 = new THREE.Quaternion(-Math.SQRT1_2, 0, 0, Math.SQRT1_2);
      const _qs = new THREE.Quaternion();
      const _z  = new THREE.Vector3(0,0,1);
      window.addEventListener('deviceorientation', e => {
        _eu.set(
          THREE.MathUtils.degToRad(e.beta  ?? 0),
          THREE.MathUtils.degToRad(e.alpha ?? 0),
         -THREE.MathUtils.degToRad(e.gamma ?? 0), 'YXZ'
        );
        camera.quaternion.setFromEuler(_eu);
        camera.quaternion.multiply(_q1);
        _qs.setFromAxisAngle(_z, -THREE.MathUtils.degToRad(window.screen?.orientation?.angle ?? 0));
        camera.quaternion.multiply(_qs);
      });

      showTapPrompt(); showLogo();

      const _rd = new THREE.Vector3();
      const _fp = new THREE.Vector3();
      let _lastFloor = null;

      // Single tap to place
      document.body.addEventListener('click', () => {
        if (placed) return;
        const pos = _lastFloor?.clone() ?? new THREE.Vector3(0, 0, -1.5);
        placeCar(pos);
      }, { once: true });

      // Render loop
      renderer.setAnimationLoop(() => {
        clock.getDelta();
        if (!placed) {
          _rd.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
          if (_rd.y < -0.01) {
            const t = -camera.position.y / _rd.y;
            if (t > 0.3 && t < 14) {
              _fp.set(camera.position.x + t*_rd.x, 0, camera.position.z + t*_rd.z);
              reticle.position.copy(_fp);
              reticle.visible = true;
              _lastFloor = _fp.clone();
              const p = 1 + 0.12 * Math.sin(Date.now() * 0.005);
              reticle.children.forEach(c => c.scale.setScalar(p));
              reticle.rotation.y += 0.02;
            } else { reticle.visible = false; }
          } else { reticle.visible = false; }
        }
        renderer.render(scene, camera);
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function animateScale(obj, target, dur) {
      const t0 = performance.now();
      (function step() {
        const t = Math.min((performance.now()-t0)/dur, 1);
        obj.scale.setScalar((1-Math.pow(1-t,3)) * target);
        if (t < 1) requestAnimationFrame(step);
      })();
    }

    function showTapPrompt() {
      tapPrompt.style.display = 'block';
      requestAnimationFrame(() => tapPrompt.classList.add('visible'));
    }
    function hideTapPrompt() {
      tapPrompt.classList.remove('visible');
      setTimeout(() => tapPrompt.style.display = 'none', 400);
    }
    function showLogo() {
      topLogo.style.display = 'block';
      requestAnimationFrame(() => topLogo.classList.add('visible'));
    }
    function showToast(msg, dur=4500) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), dur);
    }
  </script>
</body>
</html>
