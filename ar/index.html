<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile — AR Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="/config.js"></script>
  <style>
    :root { --mg-red: #da291c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Outfit', sans-serif; overflow: hidden; color: #fff; touch-action: none; }
    #safari-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: none; }
    #ar-container { position: fixed; inset: 0; z-index: 1; display: none; }
    #sov {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0a0a0f 0%, #12121a 60%, #1a0505 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.4s;
    }
    #sov.off { opacity: 0; pointer-events: none; }
    #sov img { width: 80px; filter: brightness(0) invert(1); margin-bottom: 8px; }
    #sov .sv-t { font-size: 2.4rem; font-weight: 700; letter-spacing: 0.04em; }
    #sov .sv-t em { color: var(--mg-red); font-style: normal; }
    #sov .sv-s { font-size: 0.9rem; color: rgba(255,255,255,0.5); text-align: center; max-width: 260px; line-height: 1.5; }
    #startBtn {
      margin-top: 24px; background: var(--mg-red); color: #fff;
      border: none; border-radius: 50px; padding: 16px 48px; font-size: 1rem; font-weight: 700;
      font-family: 'Outfit', sans-serif; cursor: pointer; letter-spacing: 0.08em;
      box-shadow: 0 8px 32px rgba(218,41,28,0.4); transition: transform 0.15s;
    }
    #startBtn:active { transform: scale(0.96); }
    #top-logo {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 52px; z-index: 50; filter: brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      opacity: 0; transition: opacity 0.5s; display: none;
    }
    #top-logo.visible { opacity: 1; }
    #tap-prompt {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; padding: 12px 28px;
      font-size: 0.9rem; font-weight: 600; z-index: 50; opacity: 0; transition: opacity 0.4s;
      display: none; white-space: nowrap;
    }
    #tap-prompt.visible { opacity: 1; }
    #hint-bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: none; gap: 18px; z-index: 50;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 10px 24px;
      font-size: 0.75rem; color: rgba(255,255,255,0.7); letter-spacing: 0.03em; white-space: nowrap;
    }
    #hint-bar.visible { display: flex; }
    #hint-bar span { display: flex; align-items: center; gap: 5px; }
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 22px; border-radius: 50px;
      font-size: 0.85rem; z-index: 200; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; max-width: 88vw; text-align: center;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <video id="safari-bg" autoplay playsinline muted></video>
  <div id="ar-container"></div>
  <div id="sov">
    <img src="/shared/mg-logo.svg" alt="Mobile"/>
    <div class="sv-t">Mobile <em>AR</em></div>
    <div class="sv-s">Point camera at a flat surface<br>then tap to place the phone</div>
    <button id="startBtn">Open Camera</button>
  </div>
  <img src="/shared/mg-logo.svg" id="top-logo" alt="Mobile"/>
  <div id="tap-prompt">👆 Tap to place the phone</div>
  <div id="hint-bar">
    <span>📱 Tap an App Icon to open</span>
    <span>↔ Drag to rotate</span>
    <span>🤏 Pinch to resize</span>
  </div>
  <div id="toast"></div>

  <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';

    const sov      = document.getElementById('sov');
    const startBtn = document.getElementById('startBtn');
    const container= document.getElementById('ar-container');
    const safariBg = document.getElementById('safari-bg');
    const tapPrompt= document.getElementById('tap-prompt');
    const topLogo  = document.getElementById('top-logo');
    const hintBar  = document.getElementById('hint-bar');
    const toast    = document.getElementById('toast');

    // ── App Specs Database ────────────────────────────────────────────────────
    const APPS = [
      { key:'DISPLAY', icon:'📱', tileClass:'blue',   title:'DISPLAY', val:'6.7" OLED',   detail:'120Hz LTPO',
        category:'DISPLAY TECHNOLOGY', name:'6.7" Super Retina OLED',
        specs:[{label:'Screen Tech',val:'LTPO 4.0 Super Retina AMOLED'},{label:'Resolution',val:'3200×1440 QHD+ (526 ppi)'},{label:'Refresh Rate',val:'1Hz–120Hz Dynamic Adaptive'},{label:'Brightness',val:'3000 nits Outdoor Vision'},{label:'Protection',val:'Armor Crystal Shield'}]},
      { key:'CHIPSET', icon:'⚡', tileClass:'purple', title:'CHIPSET', val:'3nm Bionic',   detail:'Octa-Core',
        category:'PROCESSOR POWER',   name:'3nm Bionic Neural Engine',
        specs:[{label:'Architecture',val:'3nm Ultra-Efficiency Process'},{label:'CPU Cores',val:'8-Core (2 Ultra + 6 Efficiency)'},{label:'GPU Engine',val:'12-Core Hardware Ray-Tracing'},{label:'AI NPU Engine',val:'32-Core Neural Processing'},{label:'Cooling System',val:'Dual Vapor Chamber Liquid'}]},
      { key:'CAMERA',  icon:'📸', tileClass:'red',    title:'CAMERA',  val:'200 MP',      detail:'8K HDR Video',
        category:'PRO CAMERA SYSTEM', name:'200 MP Quad Ultra-Sensing',
        specs:[{label:'Main Lens',val:'200 MP Ultra-Sensing OIS'},{label:'Telephoto',val:'50 MP 10x Periscope (100x Zoom)'},{label:'Ultra-Wide',val:'48 MP 123° FOV Macro System'},{label:'Video',val:'8K HDR Cinema @ 60 FPS'},{label:'AI Night Mode',val:'Real-Time Night Vision AI'}]},
      { key:'BATTERY', icon:'🔋', tileClass:'green',  title:'BATTERY', val:'5000 mAh',    detail:'100W Fast',
        category:'POWER & CHARGING',  name:'5000 mAh High-Density',
        specs:[{label:'Capacity',val:'5000 mAh Dual-Cell Density'},{label:'Wired Charge',val:'100W (0→100% in 18 mins)'},{label:'Wireless Charge',val:'50W Qi2 Magnetic Fast Charge'},{label:'Power Share',val:'15W Reverse Wireless Share'},{label:'Health AI',val:'Smart Battery Lifespan Guard'}]},
      { key:'NETWORK', icon:'📶', tileClass:'cyan',   title:'NETWORK', val:'Ultra 5G',    detail:'Wi-Fi 7',
        category:'CONNECTIVITY',      name:'Ultra 5G & Wi-Fi 7',
        specs:[{label:'5G Modem',val:'Dual 5G SA/NSA Multi-Gigabit'},{label:'Wi-Fi',val:'Wi-Fi 7 (802.11be) 6GHz Band'},{label:'Bluetooth',val:'Bluetooth 5.4 Low Latency'},{label:'Satellite',val:'Emergency 2-Way Satellite SOS'},{label:'NFC',val:'360° Multi-Angle Tap & Pay'}]},
      { key:'MEMORY',  icon:'💾', tileClass:'gold',   title:'MEMORY',  val:'512 GB',      detail:'16GB RAM',
        category:'STORAGE & SPEED',   name:'512 GB UFS 4.0 Storage',
        specs:[{label:'Storage',val:'512 GB UFS 4.0 High-Speed'},{label:'RAM',val:'16 GB LPDDR5X Ultra Memory'},{label:'Read Speed',val:'Up to 4,200 MB/s Sequential'},{label:'Write Speed',val:'Up to 2,800 MB/s Sequential'},{label:'Cloud Sync',val:'Auto-Sync Instant Cloud'}]}
    ];

    const COLORS = {
      blue:['#007aff','#00c6ff'], purple:['#af52de','#7928ca'],
      red:['#ff3b30','#ff9500'], green:['#34c759','#30d158'],
      cyan:['#5ac8fa','#007aff'], gold:['#ffcc00','#ff9500']
    };

    // ── Three.js Renderer Setup (pixel ratio capped at 1 for mobile AR) ──────
    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(1); // Fixed 1:1 — key perf improvement for mobile AR
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    scene.add(camera);

    const controller = renderer.xr.getController(0);
    scene.add(controller);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(4, 10, 6); scene.add(sun);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-4, 2, -4); scene.add(fill);

    const clock = new THREE.Clock();
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Reticle ───────────────────────────────────────────────────────────────
    function buildReticle() {
      const g = new THREE.Group();
      const og = new THREE.RingGeometry(0.20, 0.24, 48);
      og.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      g.add(new THREE.Mesh(og, new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.9, transparent: true, side: THREE.DoubleSide })));
      const dg = new THREE.CircleGeometry(0.04, 32);
      dg.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
      g.add(new THREE.Mesh(dg, new THREE.MeshBasicMaterial({ color: 0xda291c, opacity: 0.9, transparent: true })));
      g.matrixAutoUpdate = false; g.visible = false; scene.add(g);
      return g;
    }
    const reticle = buildReticle();

    // ── State ─────────────────────────────────────────────────────────────────
    let carRoot = null, bgScreenMesh = null, atlasMesh = null;
    let appHitboxes = [];      // 6 invisible PlaneGeometry hitboxes — 0 draw calls
    let homeButtonMesh = null; // Physical 3D BoxGeometry button mesh
    let placed = false, carScale = 1.0, currentScale = 1.0, carYaw = 0;
    let currentScreenState = 'HOMEPAGE', activeAppKey = null;
    let screenW = 0.1, screenH = 0.2;

    // ── GPU Texture Cache (pre-rendered once at load) ─────────────────────────
    let texWallpaper = null;
    let texHomeBtn   = null;  // dedicated texture for 3D home button
    const texAppSpec = {};
    let texAtlas = null;  // single atlas for all 6 app tiles

    function makeCanvas(w, h) {
      const c = document.createElement('canvas');
      c.width = w; c.height = h; return c;
    }
    function makeTexture(canvas) {
      const t = new THREE.CanvasTexture(canvas);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    }

    function drawGradBg(ctx, w, h) {
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, '#0c0e17'); g.addColorStop(0.5, '#121626'); g.addColorStop(1, '#080910');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(0,122,255,0.15)';
      ctx.beginPath(); ctx.arc(w*0.23, h*0.18, h*0.18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(175,82,222,0.15)';
      ctx.beginPath(); ctx.arc(w*0.78, h*0.73, h*0.21, 0, Math.PI*2); ctx.fill();
    }

    function prerenderTextures() {
      // ── 1. OLED Wallpaper (256×512) ──
      const wc = makeCanvas(256, 512);
      const wctx = wc.getContext('2d');
      drawGradBg(wctx, 256, 512);

      wctx.fillStyle = '#fff'; wctx.font = 'bold 12px Outfit,sans-serif';
      wctx.textAlign = 'left'; wctx.fillText('09:41', 14, 24);
      wctx.textAlign = 'right'; wctx.fillText('5G 100%', 242, 24);

      wctx.fillStyle = 'rgba(255,255,255,0.08)';
      wctx.beginPath(); wctx.roundRect(14, 34, 228, 38, 10); wctx.fill();
      wctx.strokeStyle = 'rgba(255,255,255,0.18)'; wctx.lineWidth = 1; wctx.stroke();
      wctx.fillStyle = '#fff'; wctx.font = 'bold 13px Outfit,sans-serif';
      wctx.textAlign = 'left'; wctx.fillText('FLAGSHIP PHONE', 24, 52);
      wctx.fillStyle = '#00f0ff'; wctx.font = '600 9px Outfit,sans-serif'; wctx.fillText('⚡ 5G ULTRA', 24, 64);

      // Bottom dock
      wctx.fillStyle = 'rgba(255,255,255,0.13)';
      wctx.beginPath(); wctx.roundRect(14, 432, 228, 44, 16); wctx.fill();
      wctx.strokeStyle = 'rgba(255,255,255,0.22)'; wctx.stroke();
      ['📞','💬','🌐','⚙️'].forEach((ic,i) => {
        wctx.font = '18px sans-serif'; wctx.textAlign = 'center'; wctx.fillText(ic, 38+i*55, 460);
      });
      wctx.fillStyle = '#fff';
      wctx.beginPath(); wctx.roundRect(98, 494, 60, 3, 2); wctx.fill();
      texWallpaper = makeTexture(wc);

      // ── 2. Six App Spec Textures (256×512 each) ──
      APPS.forEach(app => {
        const ac = makeCanvas(256, 512);
        const actx = ac.getContext('2d');
        drawGradBg(actx, 256, 512);

        actx.fillStyle = '#fff'; actx.font = 'bold 12px Outfit,sans-serif';
        actx.textAlign = 'left'; actx.fillText('09:41', 14, 24);
        actx.textAlign = 'right'; actx.fillText('5G 100%', 242, 24);

        // Hero card
        actx.fillStyle = 'rgba(255,255,255,0.08)';
        actx.beginPath(); actx.roundRect(14, 32, 228, 60, 12); actx.fill();
        actx.strokeStyle = 'rgba(255,255,255,0.18)'; actx.lineWidth = 1; actx.stroke();

        const c2 = COLORS[app.tileClass] || ['#007aff','#00c6ff'];
        const tg = actx.createLinearGradient(22, 42, 58, 78);
        tg.addColorStop(0, c2[0]); tg.addColorStop(1, c2[1]);
        actx.fillStyle = tg;
        actx.beginPath(); actx.roundRect(22, 42, 36, 36, 8); actx.fill();
        actx.font = '18px sans-serif'; actx.textAlign = 'center'; actx.fillText(app.icon, 40, 66);

        actx.textAlign = 'left';
        actx.fillStyle = '#00f0ff'; actx.font = '700 8px Outfit,sans-serif'; actx.fillText(app.category, 66, 50);
        actx.fillStyle = '#fff'; actx.font = 'bold 11px Outfit,sans-serif'; actx.fillText(app.name, 66, 65);

        // Specs list
        app.specs.forEach((s, idx) => {
          const sy = 142 + idx * 62;
          actx.fillStyle = 'rgba(255,255,255,0.06)';
          actx.beginPath(); actx.roundRect(14, sy, 228, 54, 10); actx.fill();
          actx.strokeStyle = 'rgba(255,255,255,0.1)'; actx.lineWidth = 0.8; actx.stroke();
          actx.fillStyle = 'rgba(255,255,255,0.55)'; actx.font = '600 9px Outfit,sans-serif';
          actx.textAlign = 'left'; actx.fillText(s.label, 22, sy+20);
          actx.fillStyle = '#fff'; actx.font = 'bold 12px Outfit,sans-serif'; actx.fillText(s.val, 22, sy+40);
        });

        // Bottom indicator (cyan)
        actx.fillStyle = '#00f0ff';
        actx.beginPath(); actx.roundRect(98, 494, 60, 3, 2); actx.fill();

        texAppSpec[app.key] = makeTexture(ac);
      });

      // ── 3. Dedicated 3D Home Button Texture (512×128) ──
      const hbc = makeCanvas(512, 128);
      const hbctx = hbc.getContext('2d');
      const hbg = hbctx.createLinearGradient(0, 0, 512, 128);
      hbg.addColorStop(0, '#003650'); hbg.addColorStop(0.5, '#0077aa'); hbg.addColorStop(1, '#003650');
      hbctx.fillStyle = hbg;
      hbctx.beginPath(); hbctx.roundRect(8, 8, 496, 112, 24); hbctx.fill();
      hbctx.strokeStyle = '#00f0ff'; hbctx.lineWidth = 6; hbctx.stroke();

      hbctx.shadowColor = '#00f0ff'; hbctx.shadowBlur = 12;
      hbctx.fillStyle = '#ffffff'; hbctx.font = 'bold 28px Outfit, sans-serif';
      hbctx.textAlign = 'center'; hbctx.textBaseline = 'middle';
      hbctx.fillText('🏠  RETURN TO HOME', 256, 64);
      texHomeBtn = makeTexture(hbc);

      // ── 4. Atlas Texture: all 6 app tiles on one 512×512 canvas (2 cols × 3 rows) ──
      const atc = makeCanvas(512, 384); // 2×3 grid, each cell 256×128
      const atctx = atc.getContext('2d');
      atctx.clearRect(0, 0, 512, 384);

      APPS.forEach((app, idx) => {
        const col = idx % 2;
        const row = Math.floor(idx / 2);
        const cx = col * 256, cy = row * 128;

        // Card bg
        atctx.fillStyle = 'rgba(255,255,255,0.10)';
        atctx.beginPath(); atctx.roundRect(cx+6, cy+6, 244, 116, 18); atctx.fill();
        atctx.strokeStyle = 'rgba(255,255,255,0.25)'; atctx.lineWidth = 2; atctx.stroke();

        // Icon squircle
        const c2 = COLORS[app.tileClass] || ['#007aff','#00c6ff'];
        const ig = atctx.createLinearGradient(cx+16, cy+14, cx+56, cy+54);
        ig.addColorStop(0, c2[0]); ig.addColorStop(1, c2[1]);
        atctx.fillStyle = ig;
        atctx.beginPath(); atctx.roundRect(cx+16, cy+14, 42, 42, 12); atctx.fill();
        atctx.font = '22px sans-serif'; atctx.textAlign = 'center';
        atctx.fillText(app.icon, cx+37, cy+42);

        // Title & info
        atctx.textAlign = 'left';
        atctx.fillStyle = 'rgba(255,255,255,0.6)'; atctx.font = '600 11px Outfit,sans-serif';
        atctx.fillText(app.title, cx+16, cy+68);
        atctx.fillStyle = '#fff'; atctx.font = 'bold 16px Outfit,sans-serif';
        atctx.fillText(app.val, cx+16, cy+88);
        atctx.fillStyle = '#00f0ff'; atctx.font = '600 11px Outfit,sans-serif';
        atctx.fillText(app.detail, cx+16, cy+108);
      });

      texAtlas = makeTexture(atc);
    }

    // ── Build all 3D meshes once after model loads ────────────────────────────
    function buildScreenMeshes(ctr, depthDim) {
      const Z = 0.003; // z-offset in local child space

      // ── Background Screen Plane (1 draw call) ──
      const bgGeo = new THREE.PlaneGeometry(screenW, screenH);
      const bgMat = new THREE.MeshBasicMaterial({ map: texWallpaper, side: THREE.DoubleSide, transparent: true });
      bgScreenMesh = new THREE.Mesh(bgGeo, bgMat);

      if (depthDim.axis === 'z') {
        bgScreenMesh.position.set(ctr.x, ctr.y, ctr.z + depthDim.size * 0.51);
      } else if (depthDim.axis === 'y') {
        bgScreenMesh.rotation.x = -Math.PI / 2;
        bgScreenMesh.position.set(ctr.x, ctr.y + depthDim.size * 0.51, ctr.z);
      } else {
        bgScreenMesh.rotation.y = Math.PI / 2;
        bgScreenMesh.position.set(ctr.x + depthDim.size * 0.51, ctr.y, ctr.z);
      }
      carRoot.add(bgScreenMesh);

      // ── Atlas Overlay Mesh — all 6 app tiles, 1 draw call ──
      // Positioned in lower 72% of screen (below header), centered
      const atlasGeo = new THREE.PlaneGeometry(screenW * 0.88, screenH * 0.60);
      const atlasMat = new THREE.MeshBasicMaterial({ map: texAtlas, side: THREE.DoubleSide, transparent: true });
      atlasMesh = new THREE.Mesh(atlasGeo, atlasMat);
      atlasMesh.position.set(0, -screenH * 0.06, Z);
      bgScreenMesh.add(atlasMesh);

      // ── 6 INVISIBLE Hitbox Planes (0 draw calls — pure raycast targets) ──
      const invisMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
      // Each hitbox covers exactly 1/6 of atlas area
      const hbW = screenW * 0.39, hbH = screenH * 0.175;
      const colStep = screenW * 0.22, rowStep = screenH * 0.19;
      const COLS = [-1, 1], ROWS = [1, 0, -1];
      appHitboxes = [];
      let ai = 0;
      for (const row of ROWS) {
        for (const col of COLS) {
          const hb = new THREE.Mesh(new THREE.PlaneGeometry(hbW, hbH), invisMat);
          hb.position.set(col * colStep, -screenH * 0.06 + row * rowStep, Z + 0.002);
          hb.userData = { appKey: APPS[ai].key, active: true }; // active=true on HOMEPAGE
          bgScreenMesh.add(hb);
          appHitboxes.push(hb);
          ai++;
        }
      }

      // ── Physical 3D Home Button Mesh (BoxGeometry) ──
      const btnW = screenW * 0.86;
      const btnH = screenH * 0.08;
      const btnD = screenW * 0.025;
      const btnGeo = new THREE.BoxGeometry(btnW, btnH, btnD);
      const sideMat  = new THREE.MeshBasicMaterial({ color: 0x005577 });
      const topMat   = new THREE.MeshBasicMaterial({ color: 0x0088bb });
      const botMat   = new THREE.MeshBasicMaterial({ color: 0x002244 });
      const frontMat = new THREE.MeshBasicMaterial({ map: texHomeBtn, side: THREE.FrontSide });
      const backMat  = new THREE.MeshBasicMaterial({ color: 0x050b14 });

      const materials = [sideMat, sideMat, topMat, botMat, frontMat, backMat];
      homeButtonMesh = new THREE.Mesh(btnGeo, materials);
      // Position center so back face sits at screen surface and front face extrudes forward
      homeButtonMesh.position.set(0, screenH * 0.273, Z + btnD * 0.5 + 0.001);
      homeButtonMesh.userData = { active: false, defaultZ: Z + btnD * 0.5 + 0.001 };
      homeButtonMesh.visible = false;
      bgScreenMesh.add(homeButtonMesh);
    }

    // ── Tactile 3D Button Press Animation ─────────────────────────────────────
    function triggerHomeButtonPress(callback) {
      if (!homeButtonMesh) { if (callback) callback(); return; }
      const startZ = homeButtonMesh.userData.defaultZ || homeButtonMesh.position.z;
      const pressedZ = startZ - screenW * 0.015;
      const t0 = performance.now();
      const dur = 120;
      function pressStep() {
        const elapsed = performance.now() - t0;
        const progress = Math.min(elapsed / dur, 1);
        if (progress < 0.5) {
          homeButtonMesh.position.z = startZ - (progress * 2) * (startZ - pressedZ);
        } else {
          homeButtonMesh.position.z = pressedZ + ((progress - 0.5) * 2) * (startZ - pressedZ);
        }
        if (progress < 1) {
          requestAnimationFrame(pressStep);
        } else {
          homeButtonMesh.position.z = startZ;
          if (callback) callback();
        }
      }
      requestAnimationFrame(pressStep);
    }

    // ── View Switchers (instant GPU texture swap) ─────────────────────────────
    function openAppView(appKey) {
      currentScreenState = 'APP_VIEW';
      activeAppKey = appKey;
      bgScreenMesh.material.map = texAppSpec[appKey];
      bgScreenMesh.material.needsUpdate = true;
      // Deactivate app hitboxes — both visible flag AND userData.active
      if (atlasMesh) atlasMesh.visible = false;
      appHitboxes.forEach(h => { h.visible = false; h.userData.active = false; });
      // Activate 3D home button
      if (homeButtonMesh) { homeButtonMesh.visible = true; homeButtonMesh.userData.active = true; }
    }

    function openHomepage() {
      currentScreenState = 'HOMEPAGE';
      activeAppKey = null;
      bgScreenMesh.material.map = texWallpaper;
      bgScreenMesh.material.needsUpdate = true;
      // Activate app hitboxes
      if (atlasMesh) atlasMesh.visible = true;
      appHitboxes.forEach(h => { h.visible = true; h.userData.active = true; });
      // Deactivate 3D home button
      if (homeButtonMesh) { homeButtonMesh.visible = false; homeButtonMesh.userData.active = false; }
    }

    // ── Raycasting ─────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const pointer   = new THREE.Vector2();

    // Debounce: mobile fires touchend + click ~300ms apart — only allow 1 per 450ms
    let _lastClickTime = 0;

    function checkScreenClick(clientX, clientY) {
      if (renderer.xr.isPresenting) return;
      if (!placed || !bgScreenMesh) return;
      const now = Date.now();
      if (now - _lastClickTime < 450) return; // block double-fire
      _lastClickTime = now;

      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      if (currentScreenState === 'HOMEPAGE') {
        const hits = raycaster.intersectObjects(appHitboxes, false);
        if (hits.length > 0) {
          const h = hits[0].object;
          if (h.userData.active && h.userData.appKey) openAppView(h.userData.appKey);
        }
      } else if (currentScreenState === 'APP_VIEW') {
        if (homeButtonMesh && homeButtonMesh.userData.active && homeButtonMesh.visible) {
          const hits = raycaster.intersectObject(homeButtonMesh, true);
          if (hits.length > 0) {
            triggerHomeButtonPress(() => {
              openHomepage();
            });
          }
        }
      }
    }

    // ── Load Model ────────────────────────────────────────────────────────────
    const loader = new GLTFLoader();
    const draco  = new DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
    loader.setDRACOLoader(draco);

    const modelPath = (typeof CONFIG !== 'undefined' && CONFIG.MODEL_PATH) ? CONFIG.MODEL_PATH : '/mg7.glb';
    loader.load(modelPath, (gltf) => {
      carRoot = gltf.scene;
      const box = new THREE.Box3().setFromObject(carRoot);
      const sz = new THREE.Vector3(), ctr = new THREE.Vector3();
      box.getSize(sz); box.getCenter(ctr);

      carScale = 1.0 / Math.max(sz.x, sz.y, sz.z);
      currentScale = carScale;

      const dims = [{axis:'x',size:sz.x},{axis:'y',size:sz.y},{axis:'z',size:sz.z}]
        .sort((a,b) => a.size - b.size);
      const depthDim = dims[0];
      screenW = dims[1].size * 0.92;
      screenH = dims[2].size * 0.92;

      // Pre-render all GPU textures
      prerenderTextures();

      // Build all screen meshes
      buildScreenMeshes(ctr, depthDim);

      carRoot.visible = false;
      scene.add(carRoot);
    }, undefined, (e) => showToast('Load error: ' + e.message));

    // ── Touch & Gesture Handling ──────────────────────────────────────────────
    let pinchActive = false, lastPinchDist = 0, lastPinchScale = 1.0;
    let touchStartX = 0, touchStartY = 0, lastDragX = 0;

    function getPinchDist(e) {
      return Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }

    function enableGestures() {
      document.addEventListener('touchstart', onTStart, { passive: true });
      document.addEventListener('touchmove',  onTMove,  { passive: true });
      document.addEventListener('touchend',   onTEnd,   { passive: true });
      document.addEventListener('click',      onMouseClick);
    }

    function onTStart(e) {
      if (!placed || !carRoot) return;
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; lastDragX = touchStartX;
      } else if (e.touches.length === 2) {
        pinchActive = true; lastPinchDist = getPinchDist(e); lastPinchScale = currentScale;
      }
    }

    function onTMove(e) {
      if (!placed || !carRoot) return;
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastDragX;
        const dist = Math.hypot(e.touches[0].clientX - touchStartX, e.touches[0].clientY - touchStartY);
        if (dist > 8) { lastDragX = e.touches[0].clientX; carYaw += dx * 0.008; carRoot.rotation.y = carYaw; }
      } else if (pinchActive && e.touches.length === 2) {
        const factor = getPinchDist(e) / lastPinchDist;
        currentScale = Math.max(carScale*0.3, Math.min(carScale*4.0, lastPinchScale*factor));
        carRoot.scale.setScalar(currentScale);
      }
    }

    function onTEnd(e) {
      if (e.changedTouches?.length === 1) {
        const ex = e.changedTouches[0].clientX, ey = e.changedTouches[0].clientY;
        if (Math.hypot(ex-touchStartX, ey-touchStartY) <= 8) checkScreenClick(ex, ey);
      }
      if (e.touches.length === 0) { pinchActive = false; }
      else if (e.touches.length === 1) { pinchActive = false; lastPinchDist = 0; }
    }

    function onMouseClick(e) {
      if (e.target.closest('#sov') || e.target.closest('#startBtn')) return;
      checkScreenClick(e.clientX, e.clientY);
    }

    // ── Placement ─────────────────────────────────────────────────────────────
    function placeCar(worldPos) {
      if (!carRoot) { showToast('Model still loading…'); return; }
      placed = true;
      reticle.visible = false; hideTapPrompt();
      carRoot.position.copy(worldPos);
      carRoot.scale.setScalar(0); carRoot.visible = true;
      const cp = new THREE.Vector3();
      camera.getWorldPosition(cp); cp.y = carRoot.position.y;
      carRoot.lookAt(cp); carYaw = carRoot.rotation.y;
      animateScale(carRoot, currentScale, 550);
      setTimeout(() => { hintBar.classList.add('visible'); enableGestures(); }, 620);
    }

    // ── Start Button ──────────────────────────────────────────────────────────
    startBtn.addEventListener('click', async () => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const hasWebXR = navigator.xr && await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
      if (hasWebXR) startWebXR();
      else if (isIOS) startSafariAR();
      else showToast('AR requires Chrome on Android or Safari on iOS 16+');
    });

    // ── WebXR Path ────────────────────────────────────────────────────────────
    let hitTestSrc = null, hitTestReq = false;
    async function startWebXR() {
      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['hit-test'],
          optionalFeatures: ['dom-overlay'],
          domOverlay: { root: document.body },
        });
        renderer.xr.setReferenceSpaceType('local');
        await renderer.xr.setSession(session);
        session.addEventListener('end', () => { placed = false; hitTestSrc = null; hitTestReq = false; hintBar.classList.remove('visible'); });
        sov.classList.add('off'); container.style.display = 'block';
        showTapPrompt(); showLogo();

        session.addEventListener('select', () => {
          if (!placed && reticle.visible) {
            const pos = new THREE.Vector3();
            reticle.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
            placeCar(pos);
          } else if (placed) {
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            if (currentScreenState === 'HOMEPAGE') {
              const hits = raycaster.intersectObjects(appHitboxes, false);
              if (hits.length > 0 && hits[0].object.userData?.appKey) openAppView(hits[0].object.userData.appKey);
            } else if (currentScreenState === 'APP_VIEW' && homeButtonMesh && homeButtonMesh.userData.active) {
              const hits = raycaster.intersectObject(homeButtonMesh, true);
              if (hits.length > 0) {
                triggerHomeButtonPress(() => {
                  openHomepage();
                });
              }
            }
          }
        });

        renderer.setAnimationLoop((time, frame) => {
          clock.getDelta();
          if (frame) {
            const ref = renderer.xr.getReferenceSpace();
            const ses = renderer.xr.getSession();
            if (!hitTestReq) {
              ses.requestReferenceSpace('viewer').then(vs => ses.requestHitTestSource({ space: vs }).then(s => { hitTestSrc = s; }));
              hitTestReq = true;
            }
            if (hitTestSrc && !placed) {
              const results = frame.getHitTestResults(hitTestSrc);
              if (results.length > 0) {
                reticle.visible = true;
                reticle.matrix.fromArray(results[0].getPose(ref).transform.matrix);
                reticle.matrixWorldNeedsUpdate = true;
                const p = 1 + 0.1 * Math.sin(time * 0.005);
                reticle.children.forEach(c => c.scale.setScalar(p));
              } else { reticle.visible = false; }
            }
          }
          renderer.render(scene, camera);
        });
      } catch (err) { showToast('AR start failed: ' + err.message); }
    }

    // ── Safari AR Path ────────────────────────────────────────────────────────
    async function startSafariAR() {
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
      }
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      } catch(err) { showToast('Camera denied. Enable in Settings → Safari → Camera.'); return; }
      safariBg.srcObject = stream; safariBg.style.display = 'block';
      await safariBg.play().catch(() => {});
      container.style.display = 'block'; sov.classList.add('off');
      camera.position.set(0, 1.6, 0); camera.rotation.order = 'YXZ';
      reticle.matrixAutoUpdate = true;
      const _eu = new THREE.Euler(0,0,0,'YXZ');
      const _q1 = new THREE.Quaternion(-Math.SQRT1_2,0,0,Math.SQRT1_2);
      const _qs = new THREE.Quaternion(), _z = new THREE.Vector3(0,0,1);
      window.addEventListener('deviceorientation', e => {
        _eu.set(THREE.MathUtils.degToRad(e.beta??0), THREE.MathUtils.degToRad(e.alpha??0), -THREE.MathUtils.degToRad(e.gamma??0), 'YXZ');
        camera.quaternion.setFromEuler(_eu).multiply(_q1);
        _qs.setFromAxisAngle(_z, -THREE.MathUtils.degToRad(window.screen?.orientation?.angle??0));
        camera.quaternion.multiply(_qs);
      });
      showTapPrompt(); showLogo();
      const _rd = new THREE.Vector3(), _fp = new THREE.Vector3();
      let _lastFloor = null;
      document.body.addEventListener('click', () => {
        if (placed) return;
        placeCar(_lastFloor?.clone() ?? new THREE.Vector3(0,0,-1.5));
      }, { once: true });
      renderer.setAnimationLoop(() => {
        clock.getDelta();
        if (!placed) {
          _rd.set(0,0,-1).applyQuaternion(camera.quaternion).normalize();
          if (_rd.y < -0.01) {
            const t = -camera.position.y / _rd.y;
            if (t > 0.3 && t < 14) {
              _fp.set(camera.position.x+t*_rd.x, 0, camera.position.z+t*_rd.z);
              reticle.position.copy(_fp); reticle.visible = true; _lastFloor = _fp.clone();
              const p = 1 + 0.12*Math.sin(Date.now()*0.005);
              reticle.children.forEach(c => c.scale.setScalar(p)); reticle.rotation.y += 0.02;
            } else reticle.visible = false;
          } else reticle.visible = false;
        }
        renderer.render(scene, camera);
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function animateScale(obj, target, dur) {
      const t0 = performance.now();
      (function step() {
        const t = Math.min((performance.now()-t0)/dur, 1);
        obj.scale.setScalar((1-Math.pow(1-t,3))*target);
        if (t < 1) requestAnimationFrame(step);
      })();
    }
    function showTapPrompt() { tapPrompt.style.display='block'; requestAnimationFrame(()=>tapPrompt.classList.add('visible')); }
    function hideTapPrompt() { tapPrompt.classList.remove('visible'); setTimeout(()=>tapPrompt.style.display='none',400); }
    function showLogo() { topLogo.style.display='block'; requestAnimationFrame(()=>topLogo.classList.add('visible')); }
    function showToast(msg,dur=4500) { toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),dur); }
  </script>
</body>
</html>
