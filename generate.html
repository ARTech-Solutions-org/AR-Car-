<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bake AR Icons</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #222; color: #fff; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    #log { margin-top: 20px; font-family: monospace; white-space: pre-wrap; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <h1>Bake Icons into GLB</h1>
  <p>This script will load mg7.glb, add 3D planes for the icons, and download mg7_ar.glb.</p>
  <button id="btn">Generate & Download mg7_ar.glb</button>
  <div id="log">Waiting...</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    const btn = document.getElementById('btn');
    const logEl = document.getElementById('log');
    const log = (msg) => { logEl.textContent += msg + '\n'; console.log(msg); };

    function createIconCanvas(icon, title, value, detail) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      // Background - FULLY OPAQUE so it survives iOS USDZ conversion
      ctx.fillStyle = 'rgb(18, 18, 20)';
      ctx.beginPath();
      ctx.roundRect(20, 20, 472, 472, 50);
      ctx.fill();
      ctx.lineWidth = 6;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.stroke();

      // Red top accent bar
      ctx.fillStyle = '#da291c';
      ctx.beginPath();
      ctx.roundRect(20, 20, 472, 8, [50, 50, 0, 0]);
      ctx.fill();

      // Icon
      ctx.font = '80px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText(icon, 256, 170);

      // Title
      ctx.font = 'bold 30px sans-serif';
      ctx.fillStyle = '#aaa';
      ctx.fillText(title.toUpperCase(), 256, 230);

      // Value
      ctx.font = 'bold 65px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(value, 256, 310);

      // Line
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(156, 340, 200, 4);

      // Detail
      ctx.font = 'bold 30px sans-serif';
      ctx.fillStyle = '#da291c';
      ctx.fillText(detail, 256, 400);

      return canvas;
    }

    btn.onclick = async () => {
      btn.disabled = true;
      log('Loading mg7.glb (this might take a moment to decompress)...');
      
      const loader = new GLTFLoader();
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
      loader.setDRACOLoader(dracoLoader);

      loader.load('/mg7.glb', (gltf) => {
        const scene = gltf.scene;
        log('Loaded! Calculating bounding box...');
        
        const box = new THREE.Box3().setFromObject(scene);
        const size = new THREE.Vector3();
        box.getSize(size);
        const center = new THREE.Vector3();
        box.getCenter(center);
        
        log(`Size: ${size.x.toFixed(2)}, ${size.y.toFixed(2)}, ${size.z.toFixed(2)}`);

        const SPECS = [
          { name: 'engine', icon:'⚡', title:'Engine', value:'1.5T', detail:'169 HP', 
            x: center.x, y: center.y + size.y * 0.4, z: center.z + size.z * 0.55 },
          { name: 'speed', icon:'🏎', title:'0–100', value:'8.2s', detail:'Sport Mode', 
            x: center.x + size.x * 0.55, y: center.y + size.y * 0.2, z: center.z + size.z * 0.25 },
          { name: 'tech', icon:'📡', title:'Tech', value:'ADAS L2', detail:'Lane Keep', 
            x: center.x + size.x * 0.55, y: center.y + size.y * 0.2, z: center.z - size.z * 0.3 },
          { name: 'fuel', icon:'🔋', title:'Fuel', value:'6.8L', detail:'Per 100 km', 
            x: center.x, y: center.y + size.y * 0.3, z: center.z - size.z * 0.6 },
          { name: 'length', icon:'📐', title:'Length', value:'4675mm', detail:'1842mm Wide', 
            x: center.x - size.x * 0.55, y: center.y + size.y * 0.2, z: center.z - size.z * 0.3 },
          { name: 'safety', icon:'⭐', title:'Safety', value:'5★', detail:'Euro NCAP', 
            x: center.x - size.x * 0.55, y: center.y + size.y * 0.2, z: center.z + size.z * 0.25 }
        ];

        log('Generating 3D icon planes...');
        // We will make the planes roughly 20% of the car's height
        const planeSize = size.y * 0.3;

        SPECS.forEach(s => {
          const canvas = createIconCanvas(s.icon, s.title, s.value, s.detail);
          const texture = new THREE.CanvasTexture(canvas);
          texture.colorSpace = THREE.SRGBColorSpace;
          
          // Fully opaque material so it works in iOS Quick Look USDZ conversion
          const mat = new THREE.MeshStandardMaterial({ 
            map: texture,
            side: THREE.DoubleSide,
            roughness: 1.0,
            metalness: 0.0
          });
          
          const geo = new THREE.PlaneGeometry(planeSize, planeSize);
          const mesh = new THREE.Mesh(geo, mat);
          
          mesh.position.set(s.x, s.y, s.z);
          
          // Make the plane face OUTWARDS from the center of the car
          mesh.lookAt(new THREE.Vector3(s.x * 2, s.y, s.z * 2));

          scene.add(mesh);
        });

        log('Exporting new GLB (this might take a few seconds)...');
        const exporter = new GLTFExporter();
        exporter.parse(
          scene,
          function ( gltfBuffer ) {
            log('Export complete. Downloading...');
            const blob = new Blob( [ gltfBuffer ], { type: 'application/octet-stream' } );
            const url = URL.createObjectURL( blob );
            const link = document.createElement( 'a' );
            link.style.display = 'none';
            link.href = url;
            link.download = 'mg7_ar.glb';
            document.body.appendChild( link );
            link.click();
            document.body.removeChild( link );
            URL.revokeObjectURL( url );
            log('DONE! Please move mg7_ar.glb to the root folder (beside mg7.glb).');
            btn.disabled = false;
          },
          function ( error ) {
            log('Error exporting: ' + error);
            btn.disabled = false;
          },
          { binary: true } // Export as .glb
        );
      });
    };
  </script>
</body>
</html>
